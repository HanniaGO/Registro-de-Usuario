<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro De Usuario</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #030d1a;
            --bg-card: rgba(4, 22, 45, 0.85);
            --blue-accent: #1a4a8a;
            --blue-bright: #2d7dd2;
            --blue-glow: #4a9eff;
            --white: #ffffff;
            --white-70: rgba(255,255,255,0.70);
            --white-40: rgba(255,255,255,0.40);
            --white-08: rgba(255,255,255,0.08);
            --input-bg: rgba(255,255,255,0.07);
            --input-border: rgba(255,255,255,0.18);
            --error: #ff6b6b;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background-color: var(--bg-deep);
            display: flex; align-items: center; justify-content: center;
            font-family: 'DM Sans', sans-serif;
            padding: 40px 24px;
        }


        .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(13,60,130,0.55) 0%, transparent 60%), radial-gradient(ellipse 60% 80% at 85% 80%, rgba(8,40,100,0.45) 0%, transparent 55%); }
        .bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(45,125,210,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(45,125,210,0.06) 1px, transparent 1px); background-size: 48px 48px; }

        .register-wrapper { position: relative; z-index: 10; width: 100%; max-width: 480px; animation: fadeUp 0.7s ease-out; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        .register-card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(24px);
            box-shadow: 0 32px 64px rgba(0,0,0,0.55);
        }

        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; text-decoration: none; }
        .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #1a4a8a, #2d7dd2); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .brand-name { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:var(--white); }

        .register-title { font-family: 'Syne', sans-serif; font-size: 24px; color: var(--white); margin-bottom: 8px; }
        .register-subtitle { font-size: 14px; color: var(--white-40); margin-bottom: 25px; }

        /* Estilos críticos para los campos de Django */
        .form-fields p { margin-bottom: 18px; }

        .form-fields label {
            display: block; font-size: 11px; font-weight: 600; color: var(--white-70);
            text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
        }

        /* Esto selecciona TODOS los inputs que genera Django */
        .form-fields input {
            width: 100%; padding: 12px 16px;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: 10px;
            color: var(--white);
            font-size: 15px;
            transition: 0.2s;
        }

        .form-fields input:focus {
            border-color: var(--blue-bright);
            background: rgba(45,125,210,0.08);
            outline: none;
        }


        .helptext { display: block; font-size: 11px; color: var(--white-40); margin-top: 5px; line-height: 1.4; }

        .btn-submit {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #1a4a8a, #2d7dd2);
            border: none; border-radius: 10px; color: white; font-family: 'Syne';
            font-weight: 700; cursor: pointer; margin-top: 10px;
        }

        .card-footer { margin-top: 25px; text-align: center; border-top: 1px solid var(--white-08); padding-top: 20px; }
        .card-footer a { color: var(--blue-glow); text-decoration: none; font-weight: 600; }

        .errorlist { color: var(--error); font-size: 12px; list-style: none; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="bg-layer"></div><div class="bg-grid"></div>

    <div class="register-wrapper">
        <div class="register-card">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="white" fill="none" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <div class="brand-text">
                    <div class="brand-name">DesarrolloWeb</div>
                    <div style="font-size: 10px; color: var(--white-40); text-transform: uppercase;">Practica</div>
                </div>
            </div>

            <h2 class="register-title">Crear cuenta</h2>
            <p class="register-subtitle">Completa los campos para registrarte</p>

            <form method="post">
                {% csrf_token %}
                <div class="form-fields">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn-submit">Crear cuenta</button>
            </form>

            <div class="card-footer">
                <p style="color: var(--white-40); font-size: 13px;">
                    ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
